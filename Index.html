<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gëzuar Ditëlindjen Noah! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lobster&family=Pacifico&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            text-align: center;
            position: relative;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 30px 40px;
            border-radius: 30px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.25);
            max-width: 850px;
            width: 95%;
            min-height: 650px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            position: relative;
            transition: transform 0.1s ease;
            transform-style: preserve-3d;
            perspective: 800px;
            will-change: transform;
        }
        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 3.2rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #ffdd77, 0 0 20px #ffaa33, 0 0 40px #ff8800;
            animation: titlePulse 2.5s ease-in-out infinite, bounce 2s infinite;
            letter-spacing: 2px;
            will-change: transform, text-shadow;
        }
        @keyframes titlePulse {
            0%,100% { text-shadow: 0 0 10px #ffdd77,0 0 20px #ffaa33,0 0 40px #ff8800; }
            50% { text-shadow: 0 0 20px #ffaa77,0 0 40px #ff6633,0 0 80px #ff3300; }
        }
        .gift-container {
            margin: 30px 0 10px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .gift-box {
            font-size: 7rem;
            animation: pulse 1.5s infinite;
            transition: transform 0.15s ease;
            will-change: transform;
            display: inline-block;
        }
        .gift-box.bounce-anim {
            animation: giftBounce 0.4s ease;
        }
        @keyframes giftBounce {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.3) rotate(-15deg); }
            50% { transform: scale(0.9) rotate(10deg); }
            75% { transform: scale(1.2) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .gift-hint {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: -10px;
            font-style: italic;
        }
        @keyframes pulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .cake-wrapper {
            display: none;
            position: relative;
            font-size: 8px;
            width: 30em;
            height: 35em;
            margin-top: 2em;
            animation: scaleIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) forwards;
        }
        .cake {
            height: 30em;
            width: 30em;
            position: relative;
            border-radius: 100% / 50%;
            background: #793c11;
            border-bottom: 0.25em solid #331907;
            box-shadow: 0 0 30px rgba(255,200,100,0.3);
            will-change: transform;
            transition: clip-path 0.2s ease, transform 0.3s ease, opacity 0.3s ease;
        }
        .cake::before {
            content: '';
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            height:15em;
            border-radius:50%;
            background:#793c11;
            border-bottom:0.5em solid #331907;
            z-index:10;
        }
        .cake::after {
            content: '';
            position: absolute;
            top:5em; left:0; right:0; bottom:0;
            height:15em;
            border-radius:50%;
            border-top-right-radius:25%;
            border-top-left-radius:25%;
            background:#864313;
            box-shadow:0 5em 0 #ffffcc, 0 10em 0 #864313;
        }
        
        /* FORMAT E REJA TË NGRËNIES SË TORTËS (Bite Marks) */
        .cake.bite-1 { clip-path: polygon(0% 0%, 85% 0%, 80% 15%, 90% 30%, 75% 45%, 85% 60%, 75% 75%, 85% 90%, 80% 100%, 0% 100%); }
        .cake.bite-2 { clip-path: polygon(0% 0%, 65% 0%, 60% 15%, 70% 30%, 55% 45%, 65% 60%, 55% 75%, 65% 90%, 60% 100%, 0% 100%); }
        .cake.bite-3 { clip-path: polygon(0% 0%, 45% 0%, 40% 15%, 50% 30%, 35% 45%, 45% 60%, 35% 75%, 45% 90%, 40% 100%, 0% 100%); }
        .cake.bite-4 { clip-path: polygon(0% 0%, 25% 0%, 20% 15%, 30% 30%, 15% 45%, 25% 60%, 15% 75%, 25% 90%, 20% 100%, 0% 100%); }
        .cake.bite-5 { transform: scale(0.5); opacity: 0; pointer-events: none; }

        .cake-glow {
            position: absolute;
            top:-5em; left:-5em; right:-5em; bottom:-5em;
            border-radius:50%;
            pointer-events:none;
            opacity:0;
            transition:opacity 0.8s ease;
            box-shadow:0 0 80px 40px rgba(255,215,0,0.6);
            z-index:0;
            will-change:opacity;
        }
        .cake-glow.active {
            opacity:1;
            animation: glowPulse 1.5s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,100% { box-shadow:0 0 80px 40px rgba(255,215,0,0.4); }
            50% { box-shadow:0 0 120px 70px rgba(255,215,0,0.8); }
        }
        .candle-container {
            position: absolute;
            width:100%;
            height:10em;
            bottom:22.5em;
            left:0;
            z-index:20;
            transition: opacity 0.5s ease;
        }
        .single-candle {
            position: absolute;
            height:10em;
            width:2.5em;
            border-radius:50% / 5%;
            cursor:pointer;
            user-select:none;
            transition: transform 0.15s ease, filter 0.3s ease;
            box-shadow:0 0 10px rgba(255,255,200,0.3);
            will-change:transform;
        }
        .single-candle:hover {
            transform:scale(1.05);
            filter:brightness(1.2);
        }
        .single-candle::before {
            content:'';
            position:absolute;
            top:0; left:0; right:0; bottom:0;
            height:10px;
            border-radius:50%;
        }
        .single-candle::after {
            content:'';
            position:absolute;
            top:-2em; right:0; left:0;
            margin:auto;
            border-radius:50% / 40%;
            border-top-right-radius:50% 60%;
            border-top-left-radius:50% 60%;
            background:#E29822;
            height:2.5em;
            width:1.5em;
            animation:flames 0.75s infinite alternate;
            box-shadow:0 0 12px 4px #faae38;
            transition: opacity 0.25s ease, box-shadow 0.25s ease;
            will-change:opacity,transform;
        }
        .single-candle.extinguished::after {
            opacity:0 !important;
            animation:none !important;
            box-shadow:none !important;
        }
        .single-candle.extinguished {
            filter:brightness(0.6);
            transform:scale(0.95);
        }
        .c-main   { left:50%; transform:translateX(-50%); background:#ffcc00; }
        .c-main::before { background:#cca300; }
        .c-left1  { left:38%; top:5em; background:#77DD77; }
        .c-left1::before { background:#5ec75e; }
        .c-right1 { left:54%; top:5em; background:#FF6961; }
        .c-right1::before { background:#ff4237; }
        .c-left2  { left:26%; top:-2.5em; background:#FFB347; }
        .c-left2::before { background:#ffa014; }
        .c-right2 { left:66%; top:-2.5em; background:#779ECB; }
        .c-right2::before { background:#5381b8; }
        .c-left3  { left:15%; top:2em; background:#B19CD9; }
        .c-left3::before { background:#9c80cc; }
        .c-right3 { left:77%; top:2em; background:#A5D3CA; }
        .c-right3::before { background:#8bc2b8; }
        @keyframes flames {
            0% { height:2.2em; transform:rotate(0.5deg); opacity:0.8; }
            100% { height:2.5em; transform:rotate(-0.5deg); border-radius:50% / 30%; border-top-right-radius:50% 60%; border-top-left-radius:50% 60%; opacity:1; }
        }
        @keyframes scaleIn {
            from { transform:scale(0) rotate(-10deg); opacity:0; }
            to { transform:scale(1) rotate(0); opacity:1; }
        }
        @keyframes bounce {
            0%,20%,50%,80%,100% { transform:translateY(0); }
            40% { transform:translateY(-15px); }
            60% { transform:translateY(-8px); }
        }
        
        /* TEKSTI UDHËZUES I RI POSHTË TORTËS */
        .action-text {
            display: none;
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #ffdd77;
            text-shadow: 0 0 15px #ffaa33, 0 0 30px #ff6600;
            margin-top: 20px;
            animation: pulseAction 1.5s infinite;
        }
        @keyframes pulseAction {
            0%, 100% { transform: scale(1); text-shadow: 0 0 15px #ffaa33, 0 0 30px #ff6600; }
            50% { transform: scale(1.08); text-shadow: 0 0 25px #ffdd77, 0 0 45px #ff8800; }
        }

        .wish-message {
            display:none;
            font-family:'Dancing Script',cursive;
            font-size:2.4rem;
            color:#fff5d6;
            text-shadow:0 0 30px #ffaa33, 0 0 60px #ff6600;
            margin-top:10px;
            padding:15px 30px;
            border-radius:50px;
            background:rgba(0,0,0,0.2);
            backdrop-filter:blur(5px);
            border:1px solid rgba(255,215,0,0.3);
            will-change:transform,opacity;
        }
        .wish-message.slide-in {
            display:block;
            animation: slideIn 0.8s cubic-bezier(0.175,0.885,0.32,1.275) forwards,
                       floatMessage 3s ease-in-out infinite 0.8s;
        }
        @keyframes slideIn {
            0% { transform:translateX(-120px) scale(0.4) rotate(-10deg); opacity:0; }
            100% { transform:translateX(0) scale(1) rotate(0); opacity:1; }
        }
        @keyframes floatMessage {
            0%,100% { transform:translateY(0); }
            50% { transform:translateY(-12px); }
        }
        .footer-text {
            font-size:1.6rem;
            font-weight:bold;
            margin-top:25px;
            text-shadow:1px 1px 6px rgba(0,0,0,0.5);
            animation:textGlow 2s ease-in-out infinite;
            font-family:'Lobster',cursive;
            letter-spacing:1px;
            will-change:text-shadow;
        }
        @keyframes textGlow {
            0%,100% { text-shadow:0 0 10px #ffaa33, 0 0 20px #ff6600; }
            50% { text-shadow:0 0 30px #ffdd77, 0 0 60px #ff8800, 0 0 80px #ff4400; }
        }
        .music-toggle {
            position:fixed;
            bottom:25px;
            right:25px;
            z-index:999;
            padding:12px 20px;
            background:rgba(255,255,255,0.2);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.3);
            border-radius:50px;
            color:white;
            font-size:1.2rem;
            font-weight:bold;
            cursor:pointer;
            box-shadow:0 5px 20px rgba(0,0,0,0.3);
            transition:all 0.3s ease;
            will-change:transform;
        }
        .music-toggle:hover {
            background:rgba(255,255,255,0.35);
            transform:scale(1.05);
        }

        .confetti {
            position:absolute;
            top:-20px;
            opacity:0.9;
            animation:fall linear infinite;
            z-index:1;
            pointer-events:none;
            will-change:transform,opacity;
        }
        @keyframes fall {
            0% { transform:translateY(0) rotate(0deg) scale(1); opacity:1; }
            100% { transform:translateY(110vh) rotate(720deg) scale(0.3); opacity:0.2; }
        }

        .burst-confetti {
            position:fixed;
            pointer-events:none;
            z-index:9998;
            animation:burstFall 5s ease-out forwards;
            will-change:transform,opacity;
        }
        @keyframes burstFall {
            0% { transform:translateY(0) rotate(0deg) scale(0.5); opacity:1; }
            100% { transform:translateY(110vh) rotate(720deg) scale(0.2); opacity:0; }
        }

        .falling-star {
            position:fixed;
            pointer-events:none;
            z-index:9997;
            font-size:1.8rem;
            animation:starFall 4s ease-in forwards;
            will-change:transform,opacity;
            text-shadow:0 0 20px #fff, 0 0 40px #ffdd77;
        }
        @keyframes starFall {
            0% { transform:translateY(-20px) rotate(0deg) scale(0.2); opacity:0; }
            10% { opacity:1; transform:translateY(20px) rotate(20deg) scale(1.2); }
            100% { transform:translateY(110vh) rotate(360deg) scale(0.5); opacity:0.2; }
        }

        @media (max-width:600px) {
            h1 { font-size:2.2rem; }
            .gift-box { font-size:5rem; }
            .card { padding:20px; min-height:500px; }
            .cake-wrapper { font-size:6px; width:25em; height:30em; }
            .single-candle { height:8em; width:2em; }
            .wish-message { font-size:1.8rem; padding:10px 20px; }
            .footer-text { font-size:1.2rem; }
            .action-text { font-size: 2rem; }
            .music-toggle { bottom:15px; right:15px; padding:8px 14px; font-size:1rem; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/endri73/Noah-edhe-100/main/Music/HAPPYBirthdaySong.mp3" type="audio/mp3" />
    </audio>
    <audio id="popSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/pop-cork-1.mp3" type="audio/mpeg" />
    </audio>
    <audio id="blowSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/blow-1.mp3" type="audio/mpeg" />
    </audio>

    <div class="card" id="mainCard">
        <h1 id="mainTitle">🎂 Gëzuar Ditëlindjen Noah! 🎂</h1>

        <div class="gift-container" id="giftContainer">
            <div class="gift-box" id="gift">🎁</div>
            <p class="gift-hint">(kliko 10 herë)</p>
        </div>

        <div class="cake-wrapper" id="cakeWrapper">
            <div class="candle-container" id="candleContainer">
                <div class="single-candle c-main" data-index="0" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-left1" data-index="1" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-right1" data-index="2" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-left2" data-index="3" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-right2" data-index="4" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-left3" data-index="5" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-right3" data-index="6" title="Kliko për të fikur! 🕯️"></div>
            </div>
            <div class="cake" id="theCake"></div>
            <div class="cake-glow" id="cakeGlow"></div>
        </div>

        <div id="actionText" class="action-text"></div>

        <div id="wishMessage" class="wish-message">
            🌟 Uroje një dëshirë, Noah! 🌟
        </div>

        <p class="footer-text" id="footerText">Noah gezuar ditelindjen u befsh edhe 100 vjec 🎉</p>
    </div>

    <button id="musicToggle" class="music-toggle">🔊 Muzika</button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            const body = document.body;
            const mainCard = document.getElementById('mainCard');
            const mainTitle = document.getElementById('mainTitle');
            const giftContainer = document.getElementById('giftContainer');
            const gift = document.getElementById('gift');
            const cakeWrapper = document.getElementById('cakeWrapper');
            const candleContainer = document.getElementById('candleContainer');
            const theCake = document.getElementById('theCake');
            const music = document.getElementById('bgMusic');
            const popSound = document.getElementById('popSound');
            const blowSound = document.getElementById('blowSound');
            const musicToggle = document.getElementById('musicToggle');
            const wishMsg = document.getElementById('wishMessage');
            const cakeGlow = document.getElementById('cakeGlow');
            const actionText = document.getElementById('actionText');
            const candles = document.querySelectorAll('.single-candle');

            let clicksLeft = 10;
            let candlesLit = 7;
            let isMusicPlaying = false;
            let isGiftOpened = false;
            let canEatCake = false;
            let cakeBites = 0;

            mainCard.addEventListener('mousemove', (e) => {
                const rect = mainCard.getBoundingClientRect();
                const x = (e.clientX - rect.left) / rect.width - 0.5;
                const y = (e.clientY - rect.top) / rect.height - 0.5;
                mainCard.style.transform = `rotateY(${x*6}deg) rotateX(${-y*6}deg)`;
            });
            mainCard.addEventListener('mouseleave', () => {
                mainCard.style.transform = 'rotateY(0deg) rotateX(0deg)';
            });

            giftContainer.addEventListener('click', () => {
                if (isGiftOpened) return;

                gift.classList.remove('bounce-anim');
                void gift.offsetWidth;
                gift.classList.add('bounce-anim');

                if (clicksLeft > 1) {
                    clicksLeft--;
                    burstConfetti(12);
                    popSound.currentTime = 0;
                    popSound.play().catch(() => {});
                } else {
                    isGiftOpened = true;
                    giftContainer.style.display = 'none';
                    cakeWrapper.style.display = 'block';
                    
                    // Shfaqim tekstin "Shtyp qirinjtë" poshtë tortës
                    actionText.textContent = 'Shtyp qirinjtë! 🕯️';
                    actionText.style.display = 'block';

                    music.play().catch(() => {});
                    isMusicPlaying = true;
                    musicToggle.textContent = '🔇 Muzika';

                    massiveBurst();

                    popSound.currentTime = 0;
                    popSound.play().catch(() => {});
                }
            });

            // Ngjarja kur klikon tortën (5 kafshime me pamje më të bukur)
            theCake.addEventListener('click', () => {
                if (!canEatCake) return;
                
                cakeBites++;
                
                if (cakeBites === 1) {
                    theCake.classList.add('bite-1');
                } else if (cakeBites === 2) {
                    theCake.classList.replace('bite-1', 'bite-2');
                } else if (cakeBites === 3) {
                    theCake.classList.replace('bite-2', 'bite-3');
                } else if (cakeBites === 4) {
                    theCake.classList.replace('bite-3', 'bite-4');
                } else if (cakeBites === 5) {
                    theCake.classList.replace('bite-4', 'bite-5');
                    actionText.textContent = 'Të lumtë! U bëfsh 100 vjeç! 🎉';
                    burstConfetti(40);
                    canEatCake = false; // Mbaroi torta
                }
                
                popSound.currentTime = 0;
                popSound.play().catch(() => {});
                if (cakeBites < 5) burstConfetti(15);
            });

            function massiveBurst() {
                const colors = ['#ff0','#f00','#0f0','#00f','#f0f','#0ff','#ff5733','#ffeb3b','#e91e63','#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff','#ffaa33','#ff66ff'];
                
                for (let i = 0; i < 500; i++) {
                    let el = document.createElement('div');
                    el.className = 'burst-confetti';
                    const size = (Math.random() * 14 + 6) + 'px';
                    el.style.width = size;
                    el.style.height = (Math.random() > 0.5) ? size : (parseInt(size) * 0.5 + 'px');
                    el.style.left = (Math.random() * 100) + 'vw';
                    el.style.top = (Math.random() * 20 - 10) + 'vh';
                    el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    el.style.borderRadius = (Math.random() > 0.6) ? '50%' : (Math.random() > 0.3 ? '2px' : '0');
                    if (Math.random() > 0.7) {
                        el.style.clipPath = 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)';
                        el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    }
                    const duration = Math.random() * 3 + 3;
                    el.style.animationDuration = duration + 's';
                    el.style.animationDelay = (Math.random() * 1.5) + 's';
                    body.appendChild(el);
                    setTimeout(() => { if(el.parentNode) el.remove(); }, (duration + 1) * 1000);
                }
                
                for (let i = 0; i < 250; i++) {
                    let paper = document.createElement("div");
                    paper.className = "burst-confetti";
                    paper.style.width = (Math.random()*12+6)+"px";
                    paper.style.height = (Math.random()*18+8)+"px";
                    paper.style.left = (Math.random()*100)+"vw";
                    paper.style.top = (-20-Math.random()*30)+"px";
                    paper.style.background = colors[Math.floor(Math.random()*colors.length)];
                    paper.style.borderRadius = "1px";
                    paper.style.transform = `rotate(${Math.random()*360}deg)`;
                    paper.style.animationDuration = (Math.random()*3+4)+"s";
                    paper.style.animationDelay = (Math.random()*0.5)+"s";
                    body.appendChild(paper);
                    setTimeout(()=>{ if(paper.parentNode) paper.remove();},7000);
                }
            }

            candles.forEach((candle) => {
                candle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (candle.classList.contains('extinguished')) return;
                    candle.classList.add('extinguished');
                    candlesLit--;
                    createLightWave(candle);
                    blowSound.currentTime = 0;
                    blowSound.play().catch(() => {});
                    burstConfetti(25);
                    if (candlesLit === 0) {
                        setTimeout(() => {
                            // Zhdukim qirinjtë
                            candleContainer.style.opacity = '0';
                            setTimeout(() => { candleContainer.style.display = 'none'; }, 500);

                            wishMsg.classList.add('slide-in');
                            cakeGlow.classList.add('active');
                            burstConfetti(100);
                            
                            // Ndryshojmë tekstin poshtë tortës
                            actionText.textContent = 'Shtyp tortën për ta ngrënë! 🍰';
                            
                            // Aktivizojmë tortën
                            canEatCake = true;
                            theCake.style.cursor = 'pointer';

                        }, 400);
                    }
                });
            });

            function createLightWave(candle) {
                const wave = document.createElement('div');
                wave.style.position = 'absolute';
                wave.style.width = '80px';
                wave.style.height = '80px';
                wave.style.borderRadius = '50%';
                wave.style.border = '3px solid rgba(255,255,200,0.8)';
                wave.style.boxShadow = '0 0 40px 10px rgba(255,200,100,0.6)';
                wave.style.pointerEvents = 'none';
                wave.style.zIndex = '30';
                wave.style.left = '50%';
                wave.style.top = '50%';
                wave.style.transform = 'translate(-50%,-50%) scale(0)';
                wave.style.transition = 'all 0.6s cubic-bezier(0.2,0.8,0.2,1)';
                wave.style.opacity = '1';
                wave.style.willChange = 'transform,opacity';
                const rect = candle.getBoundingClientRect();
                const cardRect = mainCard.getBoundingClientRect();
                wave.style.left = (rect.left - cardRect.left + rect.width/2 - 40) + 'px';
                wave.style.top = (rect.top - cardRect.top + rect.height/2 - 40) + 'px';
                mainCard.appendChild(wave);
                requestAnimationFrame(() => {
                    wave.style.transform = 'translate(-50%,-50%) scale(3)';
                    wave.style.opacity = '0';
                });
                setTimeout(() => { if(wave.parentNode) wave.remove(); }, 700);
            }

            function burstConfetti(count) {
                const colors = ['#ff0','#f00','#0f0','#00f','#f0f','#0ff','#ff5733','#ffeb3b','#e91e63','#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff'];
                const fragment = document.createDocumentFragment();
                for (let i=0; i<count; i++) {
                    let el = document.createElement('div');
                    el.className = 'confetti';
                    const size = (Math.random() * 10 + 4) + 'px';
                    el.style.width = size;
                    el.style.height = (Math.random() > 0.5) ? size : (parseInt(size) * 0.6 + 'px');
                    el.style.left = (Math.random() * 100) + 'vw';
                    el.style.top = (Math.random() * 40 + 20) + 'vh';
                    el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    el.style.borderRadius = (Math.random() > 0.5) ? '50%' : '2px';
                    const duration = Math.random() * 2 + 2;
                    el.style.animationDuration = duration + 's';
                    fragment.appendChild(el);
                    setTimeout(() => { if(el.parentNode) el.remove(); }, duration * 1000 + 200);
                }
                body.appendChild(fragment);
            }

            musicToggle.addEventListener('click', () => {
                if (isMusicPlaying) {
                    music.pause();
                    isMusicPlaying = false;
                    musicToggle.textContent = '🔊 Muzika';
                } else {
                    music.play().catch(() => {});
                    isMusicPlaying = true;
                    musicToggle.textContent = '🔇 Muzika';
                }
            });

            function createBackground() {
                const colorsBg = ['#ff0','#f00','#0f0','#00f','#f0f','#0ff','#ff5733','#ffeb3b','#e91e63','#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff'];
                for (let i=0; i<40; i++) {
                    let el = document.createElement('div');
                    el.className = 'confetti';
                    const size = (Math.random() * 8 + 4) + 'px';
                    el.style.width = size;
                    el.style.height = (Math.random() > 0.5) ? size : (parseInt(size) * 0.6 + 'px');
                    el.style.left = (Math.random() * 100) + 'vw';
                    el.style.background = colorsBg[Math.floor(Math.random() * colorsBg.length)];
                    el.style.borderRadius = (Math.random() > 0.5) ? '50%' : '2px';
                    el.style.animationDuration = (Math.random() * 4 + 3) + 's';
                    el.style.animationDelay = (Math.random() * 5) + 's';
                    body.appendChild(el);
                }
            }
            createBackground();

            setInterval(() => {
                if (!isGiftOpened) burstConfetti(4);
                else burstConfetti(6);
            }, 5000);

            document.addEventListener('keydown', (e) => {
                if ((e.key === 'f' || e.key === 'F') && isGiftOpened) {
                    candles.forEach(c => {
                        if (!c.classList.contains('extinguished')) c.click();
                    });
                }
            });

        });
    </script>
</body>
</html>
