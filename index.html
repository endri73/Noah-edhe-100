<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gëzuar Ditëlindjen Noah! 🎉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Lobster&family=Pacifico&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
            text-align: center;
            position: relative;
            padding: 20px;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 20px 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.25);
            max-width: 800px;
            width: 95%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            position: relative;
        }
        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px #ffdd77, 0 0 20px #ffaa33;
            letter-spacing: 1px;
        }
        .gift-container {
            margin: 20px 0 10px;
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .gift-box {
            font-size: 5rem;
            display: inline-block;
        }
        .gift-box.bounce-anim {
            animation: giftBounce 0.4s ease;
        }
        @keyframes giftBounce {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.2) rotate(-10deg); }
            50% { transform: scale(0.95) rotate(5deg); }
            75% { transform: scale(1.1) rotate(-3deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .gift-hint {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: -5px;
            font-style: italic;
        }
        .cake-wrapper {
            display: none;
            position: relative;
            font-size: 5px;
            width: 30em;
            height: 32em;
            margin-top: 10px;
            animation: scaleIn 0.6s ease forwards;
        }
        .cake {
            height: 25em;
            width: 30em;
            position: relative;
            border-radius: 100% / 50%;
            background: #793c11;
            border-bottom: 0.25em solid #331907;
            box-shadow: 0 0 20px rgba(255,200,100,0.2);
            transition: clip-path 0.2s ease, transform 0.3s ease, opacity 0.3s ease;
        }
        .cake::before {
            content: '';
            position: absolute;
            top:0; left:0; right:0; bottom:0;
            height:12em;
            border-radius:50%;
            background:#793c11;
            border-bottom:0.4em solid #331907;
            z-index:10;
        }
        .cake::after {
            content: '';
            position: absolute;
            top:4em; left:0; right:0; bottom:0;
            height:12em;
            border-radius:50%;
            border-top-right-radius:25%;
            border-top-left-radius:25%;
            background:#864313;
            box-shadow:0 4em 0 #ffffcc, 0 8em 0 #864313;
        }
        
        .cake.bite-1 { clip-path: polygon(0% 0%, 85% 0%, 80% 15%, 90% 30%, 75% 45%, 85% 60%, 75% 75%, 85% 90%, 80% 100%, 0% 100%); }
        .cake.bite-2 { clip-path: polygon(0% 0%, 65% 0%, 60% 15%, 70% 30%, 55% 45%, 65% 60%, 55% 75%, 65% 90%, 60% 100%, 0% 100%); }
        .cake.bite-3 { clip-path: polygon(0% 0%, 45% 0%, 40% 15%, 50% 30%, 35% 45%, 45% 60%, 35% 75%, 45% 90%, 40% 100%, 0% 100%); }
        .cake.bite-4 { clip-path: polygon(0% 0%, 25% 0%, 20% 15%, 30% 30%, 15% 45%, 25% 60%, 15% 75%, 25% 90%, 20% 100%, 0% 100%); }
        .cake.bite-5 { transform: scale(0.5); opacity: 0; pointer-events: none; }

        .candle-container {
            position: absolute;
            width:100%;
            height:8em;
            bottom:18em;
            left:0;
            z-index:20;
            transition: opacity 0.5s ease;
        }
        .single-candle {
            position: absolute;
            height:8em;
            width:2em;
            border-radius:50% / 5%;
            cursor:pointer;
            user-select:none;
            transition: transform 0.15s ease, filter 0.3s ease;
            box-shadow:0 0 8px rgba(255,255,200,0.2);
        }
        .single-candle::after {
            content:'';
            position:absolute;
            top:-1.8em; right:0; left:0;
            margin:auto;
            border-radius:50% / 40%;
            border-top-right-radius:50% 60%;
            border-top-left-radius:50% 60%;
            background:#E29822;
            height:2em;
            width:1.3em;
            animation:flames 0.75s infinite alternate;
            box-shadow:0 0 8px 3px #faae38;
            transition: opacity 0.25s ease;
        }
        .single-candle.extinguished::after {
            opacity:0 !important;
            animation:none !important;
        }
        .single-candle.extinguished {
            filter:brightness(0.7);
        }
        .c-main   { left:50%; transform:translateX(-50%); background:#ffcc00; }
        .c-left1  { left:38%; top:4em; background:#77DD77; }
        .c-right1 { left:54%; top:4em; background:#FF6961; }
        .c-left2  { left:26%; top:-1.5em; background:#FFB347; }
        .c-right2 { left:66%; top:-1.5em; background:#779ECB; }
        .c-left3  { left:15%; top:2em; background:#B19CD9; }
        .c-right3 { left:77%; top:2em; background:#A5D3CA; }
        
        @keyframes flames {
            0% { height:1.8em; transform:rotate(0.5deg); opacity:0.8; }
            100% { height:2.1em; transform:rotate(-0.5deg); opacity:1; }
        }
        @keyframes scaleIn {
            from { transform:scale(0) rotate(-10deg); opacity:0; }
            to { transform:scale(1) rotate(0); opacity:1; }
        }
        
        .action-text {
            display: none;
            font-family: 'Dancing Script', cursive;
            font-size: 2rem;
            color: #ffdd77;
            text-shadow: 0 0 10px #ffaa33;
            margin-top: 15px;
        }
        .wish-message {
            display:none;
            font-family:'Dancing Script',cursive;
            font-size:2rem;
            color:#fff5d6;
            text-shadow:0 0 20px #ffaa33;
            margin-top:8px;
            padding:10px 25px;
            border-radius:50px;
            background:rgba(0,0,0,0.15);
            border:1px solid rgba(255,215,0,0.3);
        }
        .wish-message.slide-in {
            display:block;
            animation: slideIn 0.6s ease forwards;
        }
        @keyframes slideIn {
            from { transform:translateX(-80px) scale(0.5); opacity:0; }
            to { transform:translateX(0) scale(1); opacity:1; }
        }
        .footer-text {
            font-size:1.4rem;
            font-weight:bold;
            margin-top:20px;
            text-shadow:1px 1px 6px rgba(0,0,0,0.5);
            font-family:'Lobster',cursive;
            letter-spacing:1px;
        }
        .music-toggle {
            position:fixed;
            bottom:20px;
            right:20px;
            z-index:999;
            padding:10px 18px;
            background:rgba(255,255,255,0.2);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.3);
            border-radius:50px;
            color:white;
            font-size:1rem;
            font-weight:bold;
            cursor:pointer;
            box-shadow:0 5px 15px rgba(0,0,0,0.3);
            transition:all 0.3s ease;
        }

        .confetti {
            position:absolute;
            top:-20px;
            opacity:0.7;
            animation:fall linear infinite;
            z-index:1;
            pointer-events:none;
        }
        @keyframes fall {
            0% { transform:translateY(0) rotate(0deg); opacity:0.8; }
            100% { transform:translateY(110vh) rotate(360deg); opacity:0; }
        }

        .burst-confetti {
            position:fixed;
            pointer-events:none;
            z-index:9998;
            animation:burstFall 4s ease-out forwards;
        }
        @keyframes burstFall {
            0% { transform:translateY(0) rotate(0deg); opacity:1; }
            100% { transform:translateY(110vh) rotate(360deg); opacity:0; }
        }

        @media (max-width:600px) {
            h1 { font-size:2rem; }
            .gift-box { font-size:4rem; }
            .card { padding:15px 20px; }
            .cake-wrapper { font-size:4px; width:28em; height:28em; }
            .single-candle { height:7em; width:1.8em; }
            .wish-message { font-size:1.5rem; padding:8px 18px; }
            .footer-text { font-size:1.1rem; }
            .action-text { font-size: 1.5rem; }
            .music-toggle { bottom:15px; right:15px; padding:8px 14px; font-size:0.9rem; }
            .candle-container { bottom:16em; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="./Music/HAPPYBirthdaySong.mp3" type="audio/mp3" />
    </audio>
    <audio id="popSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/cartoon-pop-1.mp3" type="audio/mpeg" />
    </audio>
    <audio id="blowSound" preload="auto">
        <source src="https://www.soundjay.com/misc/sounds/blow-1.mp3" type="audio/mpeg" />
    </audio>

    <div class="card" id="mainCard">
        <h1>🎂 Gëzuar Ditëlindjen Noah! 🎂</h1>

        <div class="gift-container" id="giftContainer">
            <div class="gift-box" id="gift">🎁</div>
            <p class="gift-hint">(kliko 10 herë)</p>
        </div>

        <div class="cake-wrapper" id="cakeWrapper">
            <div class="candle-container" id="candleContainer">
                <div class="single-candle c-main" data-index="0" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-left1" data-index="1" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-right1" data-index="2" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-left2" data-index="3" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-right2" data-index="4" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-left3" data-index="5" title="Kliko për të fikur! 🕯️"></div>
                <div class="single-candle c-right3" data-index="6" title="Kliko për të fikur! 🕯️"></div>
            </div>
            <div class="cake" id="theCake"></div>
        </div>

        <div id="actionText" class="action-text"></div>

        <div id="wishMessage" class="wish-message">
            🌟 Uroje një dëshirë, Noah! 🌟
        </div>

        <p class="footer-text">Noah gezuar ditelindjen u befsh edhe 100 vjec 🎉</p>
    </div>

    <button id="musicToggle" class="music-toggle">🔊 Muzika</button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {

            const body = document.body;
            const giftContainer = document.getElementById('giftContainer');
            const gift = document.getElementById('gift');
            const cakeWrapper = document.getElementById('cakeWrapper');
            const candleContainer = document.getElementById('candleContainer');
            const theCake = document.getElementById('theCake');
            const music = document.getElementById('bgMusic');
            const popSound = document.getElementById('popSound');
            const blowSound = document.getElementById('blowSound');
            const musicToggle = document.getElementById('musicToggle');
            const wishMsg = document.getElementById('wishMessage');
            const actionText = document.getElementById('actionText');
            const candles = document.querySelectorAll('.single-candle');

            let clicksLeft = 10;
            let candlesLit = 7;
            let isMusicPlaying = false;
            let isGiftOpened = false;
            let canEatCake = false;
            let cakeBites = 0;

            function massiveBurst() {
                const colors = ['#ff0','#f00','#0f0','#00f','#f0f','#0ff','#ff5733','#ffeb3b','#e91e63','#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bff','#ffaa33','#ff66ff'];
                
                for (let i = 0; i < 400; i++) {
                    let el = document.createElement('div');
                    el.className = 'burst-confetti';
                    const size = (Math.random() * 14 + 6) + 'px';
                    el.style.width = size;
                    el.style.height = (Math.random() > 0.5) ? size : (parseInt(size) * 0.5 + 'px');
                    el.style.left = (Math.random() * 100) + 'vw';
                    el.style.top = (Math.random() * 20 - 10) + 'vh';
                    el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    el.style.borderRadius = (Math.random() > 0.6) ? '50%' : (Math.random() > 0.3 ? '2px' : '0');
                    if (Math.random() > 0.7) {
                        el.style.clipPath = 'polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%)';
                        el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    }
                    const duration = Math.random() * 3 + 3;
                    el.style.animationDuration = duration + 's';
                    el.style.animationDelay = (Math.random() * 1.5) + 's';
                    body.appendChild(el);
                    setTimeout(() => { if(el.parentNode) el.remove(); }, (duration + 1.5) * 1000);
                }
                
                for (let i = 0; i < 200; i++) {
                    let paper = document.createElement("div");
                    paper.className = "burst-confetti";
                    paper.style.width = (Math.random()*12+6)+"px";
                    paper.style.height = (Math.random()*18+8)+"px";
                    paper.style.left = (Math.random()*100)+"vw";
                    paper.style.top = (-20-Math.random()*30)+"px";
                    paper.style.background = colors[Math.floor(Math.random()*colors.length)];
                    paper.style.borderRadius = "1px";
                    paper.style.transform = `rotate(${Math.random()*360}deg)`;
                    paper.style.animationDuration = (Math.random()*3+4)+"s";
                    paper.style.animationDelay = (Math.random()*0.5)+"s";
                    body.appendChild(paper);
                    setTimeout(()=>{ if(paper.parentNode) paper.remove();},6000);
                }
            }
            
            giftContainer.addEventListener('click', () => {
                if (isGiftOpened) return;

                gift.classList.remove('bounce-anim');
                void gift.offsetWidth;
                gift.classList.add('bounce-anim');

                if (clicksLeft > 1) {
                    clicksLeft--;
                    popSound.currentTime = 0;
                    popSound.play().catch(() => {});
                    burstConfetti(6);
                } else {
                    isGiftOpened = true;
                    giftContainer.style.display = 'none';
                    cakeWrapper.style.display = 'block';
                    
                    actionText.textContent = 'Shtyp qirinjtë! 🕯️';
                    actionText.style.display = 'block';

                    music.play().catch(() => {});
                    isMusicPlaying = true;
                    musicToggle.textContent = '🔇 Muzika';

                    massiveBurst();

                    popSound.currentTime = 0;
                    popSound.play().catch(() => {});
                }
            });

            theCake.addEventListener('click', () => {
                if (!canEatCake) return;
                
                cakeBites++;
                
                if (cakeBites === 1) {
                    theCake.classList.add('bite-1');
                } else if (cakeBites === 2) {
                    theCake.classList.replace('bite-1', 'bite-2');
                } else if (cakeBites === 3) {
                    theCake.classList.replace('bite-2', 'bite-3');
                } else if (cakeBites === 4) {
                    theCake.classList.replace('bite-3', 'bite-4');
                } else if (cakeBites === 5) {
                    theCake.classList.replace('bite-4', 'bite-5');
                    actionText.textContent = 'Të lumtë! U bëfsh 100 vjeç! 🎉';
                    burstConfetti(50);
                    canEatCake = false;
                }
                
                popSound.currentTime = 0;
                popSound.play().catch(() => {});
                if (cakeBites < 5) burstConfetti(10);
            });

            candles.forEach((candle) => {
                candle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (candle.classList.contains('extinguished')) return;
                    candle.classList.add('extinguished');
                    candlesLit--;
                    blowSound.currentTime = 0;
                    blowSound.play().catch(() => {});
                    burstConfetti(15);
                    if (candlesLit === 0) {
                        setTimeout(() => {
                            candleContainer.style.opacity = '0';
                            setTimeout(() => { candleContainer.style.display = 'none'; }, 500);

                            wishMsg.classList.add('slide-in');
                            burstConfetti(60);
                            
                            actionText.textContent = 'Shtyp tortën për ta ngrënë! 🍰';
                            canEatCake = true;
                            theCake.style.cursor = 'pointer';

                        }, 400);
                    }
                });
            });

            function burstConfetti(count) {
                const colors = ['#ff0','#f00','#0f0','#00f','#f0f','#0ff','#ff5733','#ffeb3b','#e91e63','#ff6b6b','#ffd93d','#6bcb77','#4d96ff'];
                const fragment = document.createDocumentFragment();
                for (let i=0; i<count; i++) {
                    let el = document.createElement('div');
                    el.className = 'confetti';
                    const size = (Math.random() * 8 + 4) + 'px';
                    el.style.width = size;
                    el.style.height = (Math.random() > 0.5) ? size : (parseInt(size) * 0.6 + 'px');
                    el.style.left = (Math.random() * 100) + 'vw';
                    el.style.top = (Math.random() * 40 + 20) + 'vh';
                    el.style.background = colors[Math.floor(Math.random() * colors.length)];
                    el.style.borderRadius = (Math.random() > 0.5) ? '50%' : '2px';
                    const duration = Math.random() * 2 + 1.5;
                    el.style.animationDuration = duration + 's';
                    fragment.appendChild(el);
                    setTimeout(() => { if(el.parentNode) el.remove(); }, duration * 1000 + 100);
                }
                body.appendChild(fragment);
            }

            musicToggle.addEventListener('click', () => {
                if (isMusicPlaying) {
                    music.pause();
                    isMusicPlaying = false;
                    musicToggle.textContent = '🔊 Muzika';
                } else {
                    music.play().catch(() => {});
                    isMusicPlaying = true;
                    musicToggle.textContent = '🔇 Muzika';
                }
            });

            const colorsBg = ['#ff0','#f00','#0f0','#00f','#f0f','#0ff','#ffeb3b','#e91e63','#ff6b6b','#4d96ff'];
            for (let i=0; i<10; i++) {
                let el = document.createElement('div');
                el.className = 'confetti';
                const size = (Math.random() * 6 + 3) + 'px';
                el.style.width = size;
                el.style.height = (Math.random() > 0.5) ? size : (parseInt(size) * 0.6 + 'px');
                el.style.left = (Math.random() * 100) + 'vw';
                el.style.background = colorsBg[Math.floor(Math.random() * colorsBg.length)];
                el.style.borderRadius = (Math.random() > 0.5) ? '50%' : '2px';
                el.style.animationDuration = (Math.random() * 6 + 4) + 's';
                el.style.animationDelay = (Math.random() * 5) + 's';
                body.appendChild(el);
            }

        });
    </script>
</body>
</html>
